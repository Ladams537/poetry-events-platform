app = "poetry-events-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"
  build_context = "../.."

[env]
  DATABASE_PATH = "/data/poetry-events.db"
  NODE_ENV = "production"
  PORT = "8787"

[mounts]
  source = "poetry_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
